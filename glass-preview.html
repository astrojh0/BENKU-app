<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 高级毛玻璃 UI 设计预览</title>
    <style>
        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 全局字体 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景渐变 */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(99, 102, 241, 0.15), transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(99, 102, 241, 0.1), transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* 容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        /* 毛玻璃卡片基础样式 */
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 悬停效果 */
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* 发光卡片 */
        .glass-card.glow {
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow: 0 4px 24px rgba(99, 102, 241, 0.2);
            }
            50% {
                box-shadow: 0 4px 40px rgba(99, 102, 241, 0.5);
            }
        }

        /* 毛玻璃按钮 */
        .glass-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 24px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
            user-select: none;
        }

        .glass-button:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        .glass-button:active {
            transform: scale(0.97);
        }

        /* 主要按钮 */
        .glass-button.primary {
            background: #6366f1;
            border-color: #6366f1;
        }

        .glass-button.primary:hover {
            box-shadow: 0 4px 24px rgba(99, 102, 241, 0.5);
        }

        /* 小按钮 */
        .glass-button.small {
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 8px;
        }

        /* 幽灵按钮 */
        .glass-button.ghost {
            background: transparent;
            border: none;
        }

        .glass-button.ghost:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        /* 毛玻璃输入框 */
        .glass-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
            padding: 14px 20px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }

        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .glass-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1),
                        0 4px 16px rgba(0, 0, 0, 0.4);
        }

        /* 标题样式 */
        .hero-title {
            font-size: 32px;
            font-weight: 700;
            line-height: 1.25;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            text-align: center;
        }

        .hero-subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        /* 区域间隔 */
        .section {
            margin-bottom: 32px;
        }

        /* 功能卡片网格 */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .feature-card {
            text-align: center;
            padding: 20px;
        }

        .feature-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .feature-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .feature-description {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
        }

        /* 统计数据 */
        .stats-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #6366f1;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        .stat-divider {
            width: 1px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* 推荐卡片 */
        .recommend-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .recommend-tag {
            font-size: 13px;
            font-weight: 600;
            color: #6366f1;
        }

        .recommend-date {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        .recommend-sentence {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .recommend-translation {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 16px;
        }

        .recommend-actions {
            display: flex;
            gap: 12px;
        }

        /* 导航 */
        .nav-card {
            margin-bottom: 24px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 20px;
            font-weight: 700;
        }

        /* Hero 发光背景 */
        .hero-glow {
            position: absolute;
            width: 320px;
            height: 200px;
            border-radius: 50%;
            background: #6366f1;
            opacity: 0.15;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            filter: blur(40px);
            animation: heroGlow 4s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes heroGlow {
            0%, 100% { opacity: 0.1; transform: translateX(-50%) scale(1); }
            50% { opacity: 0.25; transform: translateX(-50%) scale(1.1); }
        }

        /* 标题 */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
        }

        /* 入场动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
        }

        .animate-in-delay-1 {
            animation-delay: 0.1s;
        }

        .animate-in-delay-2 {
            animation-delay: 0.2s;
        }

        .animate-in-delay-3 {
            animation-delay: 0.3s;
        }

        /* 响应式 */
        @media (max-width: 400px) {
            .hero-title {
                font-size: 28px;
            }
            .feature-grid {
                gap: 8px;
            }
            .feature-card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="container">
        <!-- 页面标题 -->
        <div class="page-header animate-in">
            <h1 class="page-title">✨ 高级毛玻璃 UI</h1>
            <button class="glass-button ghost small" onclick="alert('这是一个预览页面！')">关于</button>
        </div>

        <!-- Hero 区域 -->
        <section class="section animate-in animate-in-delay-1">
            <div class="hero-glow"></div>
            <div class="glass-card glow" style="position: relative;">
                <h2 class="hero-title">智能语言学习助手</h2>
                <p class="hero-subtitle">拍照识别 · 语音朗读 · 智能翻译</p>
                
                <div style="margin-bottom: 16px;">
                    <input type="text" class="glass-input" placeholder="输入你想学习的句子或单词...">
                </div>
                
                <button class="glass-button primary" style="width: 100%;" onclick="alert('开始学习！')">
                    开始学习
                </button>
            </div>
        </section>

        <!-- 功能卡片 -->
        <section class="section animate-in animate-in-delay-2">
            <h3 class="section-title">核心功能</h3>
            <div class="feature-grid">
                <div class="glass-card feature-card">
                    <div class="feature-icon">📷</div>
                    <div class="feature-title">智能识别</div>
                    <div class="feature-description">拍照即可识别文字</div>
                </div>
                <div class="glass-card feature-card">
                    <div class="feature-icon">🔊</div>
                    <div class="feature-title">语音朗读</div>
                    <div class="feature-description">标准发音示范</div>
                </div>
                <div class="glass-card feature-card">
                    <div class="feature-icon">📚</div>
                    <div class="feature-title">收藏学习</div>
                    <div class="feature-description">建立个人词库</div>
                </div>
                <div class="glass-card feature-card">
                    <div class="feature-icon">🌐</div>
                    <div class="feature-title">智能翻译</div>
                    <div class="feature-description">多语言支持</div>
                </div>
            </div>
        </section>

        <!-- 统计数据 -->
        <section class="section animate-in animate-in-delay-3">
            <div class="glass-card">
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-number">1,234</div>
                        <div class="stat-label">已学习</div>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <div class="stat-number">56</div>
                        <div class="stat-label">收藏</div>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <div class="stat-number">12</div>
                        <div class="stat-label">天连续</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 推荐学习 -->
        <section class="section animate-in animate-in-delay-3" style="animation-delay: 0.4s;">
            <h3 class="section-title">推荐学习</h3>
            <div class="glass-card">
                <div class="recommend-header">
                    <span class="recommend-tag">日语</span>
                    <span class="recommend-date">今天</span>
                </div>
                <div class="recommend-sentence">こんにちは、元気ですか？</div>
                <div class="recommend-translation">你好，你好吗？</div>
                <div class="recommend-actions">
                    <button class="glass-button small" onclick="alert('朗读中...')">
                        朗读
                    </button>
                    <button class="glass-button ghost small" onclick="alert('已收藏！')">
                        收藏
                    </button>
                </div>
            </div>
        </section>

        <!-- 底部说明 -->
        <section class="section" style="margin-top: 40px; text-align: center;">
            <div class="glass-card" style="padding: 16px;">
                <p style="color: rgba(255, 255, 255, 0.7); font-size: 13px;">
                    🎨 高级毛玻璃 UI 设计预览 | 深色主题 + 发光动效
                </p>
            </div>
        </section>
    </div>

    <script>
        // 交互效果演示
        document.querySelectorAll('.glass-card, .glass-button, .glass-input').forEach(el => {
            el.addEventListener('mouseenter', function() {
                if (this.classList.contains('glass-card')) {
                    this.style.transform = 'translateY(-2px)';
                } else if (this.classList.contains('glass-button')) {
                    this.style.transform = 'translateY(-1px)';
                }
            });
            
            el.addEventListener('mouseleave', function() {
                if (this.classList.contains('glass-card')) {
                    this.style.transform = 'translateY(0)';
                } else if (this.classList.contains('glass-button')) {
                    this.style.transform = 'translateY(0)';
                }
            });
        });

        // 按钮按下效果
        document.querySelectorAll('.glass-button').forEach(btn => {
            btn.addEventListener('mousedown', function() {
                this.style.transform = 'scale(0.97)';
            });
            
            btn.addEventListener('mouseup', function() {
                this.style.transform = 'scale(1)';
            });
        });

        console.log('✨ 高级毛玻璃 UI 设计 - 预览页面');
        console.log('提示：悬停在元素上查看动效效果');
    </script>
</body>
</html>
