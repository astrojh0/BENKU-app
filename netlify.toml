[build]
  command = "npx expo export --platform web"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/openai-proxy"
  to = "/.netlify/functions/openai-proxy"
  status = 200

[[redirects]]
  from = "/api/gemini-proxy"
  to = "/.netlify/functions/gemini-proxy"
  status = 200

[[redirects]]
  from = "/api/google-vision"
  to = "/.netlify/functions/google-vision"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200