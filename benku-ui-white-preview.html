<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENKU UI Preview - Sketch Design</title>
    <style>
        :root {
            --bg: #F5F5F7;
            --bg-card: #FFFFFF;
            --text-primary: #1D1D1F;
            --text-secondary: #86868B;
            --text-muted: #9C9C9C;
            --border: #E8E8ED;
            --radius-xl: 32px;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --radius-full: 9999px;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.06), 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-btn: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-elevated: 0 12px 40px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .preview-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 80px 40px;
        }

        .preview-header {
            text-align: center;
            margin-bottom: 80px;
        }

        .preview-header h1 {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.04em;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .preview-header p {
            font-size: 16px;
            color: var(--text-secondary);
        }

        .screens-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 60px;
            justify-items: center;
        }

        .phone-frame {
            background: transparent;
            border-radius: var(--radius-xl);
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .phone-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .phone-screen {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 9/19.5;
            background: var(--bg);
            border-radius: var(--radius-xl);
            overflow: hidden;
            position: relative;
            box-shadow: var(--shadow-elevated);
        }

        .phone-inner {
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
        }

        .status-bar {
            height: 52px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 0 8px 12px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0 4px 16px;
        }

        .tab-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            max-width: 280px;
        }

        .tab-btn {
            padding: 10px 16px;
            border-radius: var(--radius-full);
            border: none;
            font-size: 14px;
            font-weight: 500;
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            box-shadow: var(--shadow-btn);
            transition: all 0.15s ease;
        }

        .tab-btn:active {
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.08);
            transform: scale(0.97);
        }

        .tab-btn.active {
            background: var(--text-primary);
            color: var(--bg-card);
            box-shadow: var(--shadow-card);
        }

        .text-btn {
            padding: 12px 20px;
            border-radius: var(--radius-lg);
            border: none;
            font-size: 14px;
            font-weight: 500;
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            box-shadow: var(--shadow-btn);
            transition: all 0.15s ease;
        }

        .text-btn:active {
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.08);
            transform: scale(0.97);
        }

        .chat-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px 4px;
            padding-bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-content::-webkit-scrollbar {
            display: none;
        }

        .bubble {
            max-width: 80%;
            padding: 14px 18px;
            font-size: 15px;
            line-height: 1.5;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
        }

        .bubble-user {
            align-self: flex-end;
            background: var(--text-primary);
            color: var(--bg-card);
            border-bottom-right-radius: 8px;
        }

        .bubble-ai {
            align-self: flex-start;
            background: var(--bg-card);
            color: var(--text-primary);
            border-bottom-left-radius: 8px;
        }

        .input-area {
            position: absolute;
            bottom: 24px;
            left: 16px;
            right: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border-radius: var(--radius-full);
            padding: 0 20px;
            height: 56px;
            box-shadow: var(--shadow-btn);
        }

        .input-field {
            flex: 1;
            height: 100%;
            background: transparent;
            border: none;
            font-size: 16px;
            outline: none;
            color: var(--text-primary);
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--text-primary);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--bg-card);
            box-shadow: var(--shadow-card);
            transition: all 0.15s ease;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn svg {
            width: 22px;
            height: 22px;
        }

        @media (max-width: 640px) {
            .preview-container {
                padding: 40px 20px;
            }
            .screens-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="preview-container">
        <div class="preview-header">
            <h1>BENKU</h1>
            <p>Sketch-Based Design Preview</p>
        </div>
        
        <div class="screens-grid">
            <div class="phone-frame">
                <div class="phone-title">Chat Screen (Sketch)</div>
                <div class="phone-screen">
                    <div class="phone-inner">
                        <div class="status-bar">
                            <span>9:41</span>
                            <span>●●●</span>
                        </div>
                        
                        <div class="top-bar">
                            <div class="tab-buttons">
                                <button class="tab-btn active">日语</button>
                                <button class="tab-btn">什么意思</button>
                                <button class="tab-btn">提问</button>
                            </div>
                            <button class="text-btn">文字</button>
                        </div>
                        
                        <div class="chat-content">
                            <div class="bubble bubble-ai">
                                こんにちは！今日は何を勉強しましょうか？
                            </div>
                            <div class="bubble bubble-user">
                                こんにちはを自然な言い方で教えてください
                            </div>
                            <div class="bubble bubble-ai">
                                自然な会話では「こんちはー」や「ちわっ」のように少し崩した言い方も使われます。
                            </div>
                            <div class="bubble bubble-user">
                                わかりました、ありがとう！
                            </div>
                        </div>
                        
                        <div class="input-area">
                            <div class="input-wrapper">
                                <input class="input-field" placeholder="输入..." />
                            </div>
                            <button class="send-btn">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
