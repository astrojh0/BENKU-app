<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENKU UI Preview - Glass Slider Design</title>
    <style>
        :root {
            --bg: #F5F5F7;
            --bg-card: #FFFFFF;
            --text-primary: #1D1D1F;
            --text-secondary: #86868B;
            --text-muted: #9C9C9C;
            --border: #E5E5EA;
            --radius-xl: 32px;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --radius-full: 9999px;
            --shadow-card: 0 4px 12px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            --shadow-elevated: 0 16px 48px rgba(0, 0, 0, 0.1), 0 4px 12px rgba(0, 0, 0, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .preview-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 80px 40px;
        }

        .preview-header {
            text-align: center;
            margin-bottom: 80px;
        }

        .preview-header h1 {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.04em;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .preview-header p {
            font-size: 16px;
            color: var(--text-secondary);
        }

        .screens-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 60px;
            justify-items: center;
        }

        .phone-frame {
            background: transparent;
            border-radius: var(--radius-xl);
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .phone-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .phone-screen {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 9/19.5;
            background: var(--bg);
            border-radius: var(--radius-xl);
            overflow: hidden;
            position: relative;
            box-shadow: var(--shadow-elevated);
        }

        .phone-inner {
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
        }

        .status-bar {
            height: 52px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 0 8px 12px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .segmented-control {
            margin: 8px 4px 20px;
            padding: 4px;
            background: rgba(0, 0, 0, 0.03);
            border-radius: var(--radius-full);
            display: flex;
            position: relative;
            overflow: visible;
        }

        .segment-glass {
            position: absolute;
            top: 3px;
            left: 3px;
            height: calc(100% - 6px);
            width: calc(33.333% - 6px);
            background: var(--bg-card);
            border-radius: var(--radius-full);
            box-shadow: var(--shadow-glass);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
            border: 0.5px solid rgba(255, 255, 255, 0.5);
        }

        .segment-btn {
            flex: 1;
            padding: 10px 12px;
            border: none;
            background: transparent;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            position: relative;
            z-index: 2;
            transition: color 0.2s ease;
        }

        .segment-btn.active {
            color: var(--text-primary);
            font-weight: 600;
        }

        .chat-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px 4px;
            padding-bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-content::-webkit-scrollbar {
            display: none;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-primary);
            padding: 4px 8px;
        }

        .message-card {
            background: var(--bg-card);
            border: 0.5px solid rgba(0, 0, 0, 0.06);
            border-radius: var(--radius-md);
            padding: 16px;
            box-shadow: var(--shadow-card);
            margin: 4px 0;
            position: relative;
        }

        .message-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.8));
            border-radius: var(--radius-md) var(--radius-md) 0 0;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .card-content {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .bubble {
            max-width: 80%;
            padding: 14px 18px;
            font-size: 15px;
            line-height: 1.5;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            position: relative;
        }

        .bubble::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.8));
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        .bubble-user {
            align-self: flex-end;
            background: var(--text-primary);
            color: var(--bg-card);
            border-bottom-right-radius: 8px;
        }

        .bubble-user::before {
            display: none;
        }

        .bubble-ai {
            align-self: flex-start;
            background: var(--bg-card);
            color: var(--text-primary);
            border-bottom-left-radius: 8px;
        }

        .input-area {
            position: absolute;
            bottom: 24px;
            left: 16px;
            right: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border: 0.5px solid rgba(0, 0, 0, 0.08);
            border-radius: var(--radius-full);
            padding: 0 20px;
            height: 56px;
            box-shadow: var(--shadow-glass);
            position: relative;
        }

        .input-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.9));
            border-radius: var(--radius-full) var(--radius-full) 0 0;
        }

        .input-field {
            flex: 1;
            height: 100%;
            background: transparent;
            border: none;
            font-size: 16px;
            outline: none;
            color: var(--text-primary);
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--text-primary);
            border: 0.5px solid rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--bg-card);
            box-shadow: var(--shadow-glass);
            transition: all 0.15s ease;
            position: relative;
        }

        .send-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.3));
            border-radius: 50% 50% 0 0;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn svg {
            width: 22px;
            height: 22px;
        }

        @media (max-width: 640px) {
            .preview-container {
                padding: 40px 20px;
            }
            .screens-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="preview-container">
        <div class="preview-header">
            <h1>BENKU</h1>
            <p>Glass Slider Design Preview</p>
        </div>
        
        <div class="screens-grid">
            <div class="phone-frame">
                <div class="phone-title">Chat Screen</div>
                <div class="phone-screen">
                    <div class="phone-inner">
                        <div class="status-bar">
                            <span>9:41</span>
                            <span>●●●</span>
                        </div>
                        
                        <div class="segmented-control">
                            <div class="segment-glass" id="segment-glass"></div>
                            <button class="segment-btn active">日语</button>
                            <button class="segment-btn">什么意思</button>
                            <button class="segment-btn">提问</button>
                        </div>
                        
                        <div class="chat-content">
                            <div class="bubble bubble-user">
                                こんにちはを教えてください
                            </div>
                            
                            <div class="message-text">
                                こんにちは的意思是"你好"，是日语中最常用的问候语。
                            </div>
                            
                            <div class="message-card">
                                <div class="card-title">こんにちは</div>
                                <div class="card-content">
                                    意思：你好<br>
                                    词性：感叹词<br>
                                    罗马音：konnichiwa<br>
                                    使用场景：白天见面时使用
                                </div>
                            </div>
                            
                            <div class="message-text">
                                接下来我来给你举几个例子，让你更好地理解。
                            </div>
                            
                            <div class="message-card">
                                <div class="card-title">例句</div>
                                <div class="card-content">
                                    1. こんにちは、元気ですか？<br>
                                    你好，最近好吗？<br><br>
                                    2. こんにちは、お久しぶりです。<br>
                                    你好，好久不见。
                                </div>
                            </div>
                            
                            <div class="message-text">
                                希望这些信息对你有帮助！还有其他想了解的吗？
                            </div>
                        </div>
                        
                        <div class="input-area">
                            <div class="input-wrapper">
                                <input class="input-field" placeholder="输入..." />
                            </div>
                            <button class="send-btn">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 添加交互效果
        const segmentBtns = document.querySelectorAll('.segment-btn');
        const segmentGlass = document.getElementById('segment-glass');
        
        segmentBtns.forEach((btn, index) => {
            btn.addEventListener('click', () => {
                segmentBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const width = 100 / segmentBtns.length;
                segmentGlass.style.left = `calc(${index * width}% + 3px)`;
            });
        });
    </script>
</body>
</html>
