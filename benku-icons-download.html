</head>
<body>

            <div class="icon-desc">柔和粉色 · 温暖治愈</div>

        <div class="icon-box">

                    <text x="100" y="118" font-family="Arial Black" font-size="45" font-weight="900" fill="white" text-anchor="middle">B</text>
                </svg>
            </div>
            <div class="icon-name">未来科技风</div>
            <div class="icon-desc">3D 效果 · AI 智能感</div>

    <div class="instructions">
        <h2>✨ 图标信息</h2>
        <p>
            <strong>尺寸：</strong>512 x 512 像素<br>
            <strong>格式：</strong>PNG（支持透明背景）<br>
            <strong>版权：</strong>可免费商用 · Benku App 专用
        </p>
    </div>

    <canvas id="canvas" width="512" height="512"></canvas>

    <script>
        const iconConfigs = {
            'icon1': {
                name: '现代简约风',
                gradient: ['#667eea', '#764ba2'],
                shapes: [
                    { type: 'path', d: 'M40 50 L100 30 L160 50 L160 150 L100 130 L40 150 Z', fill: 'white' },
                    { type: 'text', x: 100, y: 105, text: 'B', fill: 'rgba(0,0,0,0.7)', size: 45, bold: true }
                ]
            },
            'icon2': {
                name: '活泼彩色风',
                gradient: ['#f093fb', '#f5576c'],
                shapes: [
                    { type: 'rect', x: 40, y: 50, w: 120, h: 100, rx: 15, fill: 'white' },
                    { type: 'path', d: 'M60 70 L100 55 L140 70 L140 120 L100 105 L60 120 Z', fill: '#f5576c' },
                    { type: 'text', x: 100, y: 100, text: 'K', fill: 'white', size: 32, bold: true }
                ]
            },
            'icon3': {
                name: '专业商务风',
                gradient: ['#4facfe', '#00f2fe'],
                shapes: [
                    { type: 'rect', x: 45, y: 55, w: 110, h: 90, rx: 8, fill: 'white' },
                    { type: 'rect', x: 60, y: 70, w: 80, h: 60, rx: 4, fill: '#e8f4fc' },
                    { type: 'line', x1: 70, y1: 85, x2: 130, y2: 85, stroke: '#4facfe', width: 4 },
                    { type: 'line', x1: 70, y1: 100, x2: 115, y2: 100, stroke: '#4facfe', width: 2.5, opacity: 0.6 },
                    { type: 'line', x1: 70, y1: 112, x2: 120, y2: 112, stroke: '#4facfe', width: 2.5, opacity: 0.4 },
                    { type: 'text', x: 100, y: 52, text: 'B', fill: '#4facfe', size: 28, bold: true }
                ]
            },
            'icon4': {
                name: '极简主义风',
                gradient: ['#43e97b', '#38f9d7'],
                shapes: [
                    { type: 'text', x: 100, y: 140, text: 'B', fill: 'white', size: 110, bold: true, font: 'Arial Black' },
                    { type: 'line', x1: 35, y1: 160, x2: 165, y2: 160, stroke: 'white', width: 3, opacity: 0.5 }
                ]
            },
            'icon5': {
                name: '可爱萌系风',
                gradient: ['#fa709a', '#fee140'],
                shapes: [
                    { type: 'circle', cx: 100, cy: 100, r: 65, fill: 'white' },
                    { type: 'path', d: 'M65 75 L100 60 L135 75 L135 130 L100 115 L65 130 Z', fill: '#fa709a' },
                    { type: 'text', x: 100, y: 108, text: 'K', fill: 'white', size: 28, bold: true }
                ]
            },
            'icon6': {
                name: '未来科技风',
                gradient: ['#a18cd1', '#fbc2eb'],
                shapes: [
                    { type: 'circleStroke', cx: 100, cy: 100, r: 70, stroke: 'white', width: 3, opacity: 0.3 },
                    { type: 'circle', cx: 100, cy: 100, r: 55, fill: 'rgba(255,255,255,0.1)', stroke: 'white', width: 2 },
                    { type: 'text', x: 100, y: 118, text: 'B', fill: 'white', size: 45, bold: true, font: 'Arial Black' }
                ]
            }
        };

        function createGradient(ctx, gradient, width, height) {
            const grd = ctx.createLinearGradient(0, 0, width, height);
            grd.addColorStop(0, gradient[0]);
            grd.addColorStop(1, gradient[1]);
            return grd;
        }

        function drawShape(ctx, shape) {
            ctx.save();
            
            if (shape.opacity !== undefined) {
                ctx.globalAlpha = shape.opacity;
            }

            switch (shape.type) {
                case 'rect':
                    if (shape.rx) {
                        roundedRect(ctx, shape.x, shape.y, shape.w, shape.h, shape.rx);
                        ctx.fillStyle = shape.fill;
                        ctx.fill();
                    }
                    break;
                    
                case 'path':
                    const path = new Path2D(shape.d);
                    ctx.fillStyle = shape.fill;
                    ctx.fill(path);
                    break;
                    
                case 'text':
                    ctx.font = `${shape.bold ? 'bold ' : ''}${shape.size}px ${shape.font || 'Arial'}`;
                    ctx.fillStyle = shape.fill;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(shape.text, shape.x, shape.y);
                    break;
                    
                case 'line':
                    ctx.beginPath();
                    ctx.moveTo(shape.x1, shape.y1);
                    ctx.lineTo(shape.x2, shape.y2);
                    ctx.strokeStyle = shape.stroke;
                    ctx.lineWidth = shape.width;
                    ctx.stroke();
                    break;
                    
                case 'circle':
                    ctx.beginPath();
                    ctx.arc(shape.cx, shape.cy, shape.r, 0, Math.PI * 2);
                    if (shape.stroke) {
                        ctx.strokeStyle = shape.stroke;
                        ctx.lineWidth = shape.width;
                        ctx.stroke();
                    }
                    if (shape.fill && !shape.stroke) {
                        ctx.fillStyle = shape.fill;
                        ctx.fill();
                    }
                    break;
                    
                case 'circleStroke':
                    ctx.beginPath();
                    ctx.arc(shape.cx, shape.cy, shape.r, 0, Math.PI * 2);
                    ctx.strokeStyle = shape.stroke;
                    ctx.lineWidth = shape.width;
                    ctx.globalAlpha = shape.opacity;
                    ctx.stroke();
                    break;
            }
            
            ctx.restore();
        }

        function roundedRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        function downloadIcon(iconId, filename) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const config = iconConfigs[iconId];

            // 清除画布
            ctx.clearRect(0, 0, 512, 512);

            // 绘制圆角矩形背景
            roundedRect(ctx, 0, 0, 512, 512, 90);
            ctx.fillStyle = createGradient(ctx, config.gradient, 512, 512);
            ctx.fill();

            // 缩放因子（SVG 是 200x200，需要缩放到 512x512）
            const scale = 2.56;
            ctx.save();
            ctx.scale(scale, scale);

            // 绘制所有图形
            config.shapes.forEach(shape => drawShape(ctx, shape));

            ctx.restore();

            // 下载图片
            const link = document.createElement('a');
            link.download = `benku-icon-${filename}-512x512.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();

            console.log(`✅ 已下载: ${config.name}`);
        }

        console.log('🎨 Benku 图标下载器已就绪');
        console.log('点击任意图标按钮即可下载 512x512 PNG 文件');
    </script>
</body>
